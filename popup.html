<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Key Sound</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0f13;
      color: #e8e4dc;
      width: 300px;
      padding: 18px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .title { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: #f0ebe0; }
    .subtitle { font-size: 11px; color: #5a5855; margin-top: 2px; font-weight: 300; }

    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2a2830; border-radius: 11px;
      cursor: pointer; transition: background 0.25s;
      border: 1px solid #3a3840;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; left: 3px; top: 2px;
      background: #6b6760; border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    input:checked + .slider { background: #2d4a3e; border-color: #4a8c72; }
    input:checked + .slider::before { transform: translateX(18px); background: #6fcba0; }

    .label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; color: #4a4845;
      text-transform: uppercase; margin-bottom: 9px;
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-bottom: 16px;
    }

    .style-btn {
      background: #1a1820;
      border: 1px solid #2a2830;
      border-radius: 8px;
      padding: 8px 4px 7px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      color: #6b6760;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .style-btn:hover { border-color: #3a3840; color: #a0998e; }
    .style-btn.active { background: #1e2d28; border-color: #4a8c72; color: #6fcba0; }

    .style-icon { font-size: 16px; }
    .style-name { font-size: 9px; font-weight: 500; letter-spacing: 0.02em; line-height: 1.2; }

    .volume-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .vol-icon { font-size: 13px; color: #4a4845; }

    input[type=range] {
      -webkit-appearance: none; flex: 1;
      height: 3px; background: #2a2830; border-radius: 2px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      background: #6fcba0; border-radius: 50%;
      cursor: pointer; transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .vol-value { font-size: 11px; color: #4a4845; width: 28px; text-align: right; }

    .divider { border: none; border-top: 1px solid #1e1d22; margin: 14px 0; }
    .footer { font-size: 10px; color: #3a3840; text-align: center; letter-spacing: 0.04em; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title">⌨️ Key Sound</div>
      <div class="subtitle">Click a sound to preview it</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="label">Sound Style</div>
  <div class="style-grid" id="styleGrid"></div>

  <div class="label">Volume</div>
  <div class="volume-row">
    <span class="vol-icon">🔈</span>
    <input type="range" id="volumeSlider" min="0" max="100" value="50" />
    <span class="vol-icon">🔊</span>
    <span class="vol-value" id="volDisplay">50%</span>
  </div>

  <hr class="divider" />
  <div class="footer">monkeytype sounds · works everywhere</div>

  <script src="popup.js"></script>
</body>
</html>
